<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Robot Math</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Fredoka", sans-serif;
                background: #e8f4f8;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 20px;
                color: #333;
                overflow-x: hidden;
            }

            h1 {
                font-size: 2.4rem;
                color: #2a7de1;
                margin-bottom: 20px;
                text-align: center;
            }

            .game-area {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: flex-start;
                gap: 30px;
                max-width: 800px;
                width: 100%;
            }

            /* --- Robot --- */
            .robot-container {
                width: 220px;
                height: 340px;
                position: relative;
            }

            .robot-part {
                position: absolute;
                opacity: 0;
                transition:
                    opacity 0.4s,
                    transform 0.4s;
                transform: scale(0.8);
            }
            .robot-part.visible {
                opacity: 1;
                transform: scale(1);
            }

            svg.robot {
                width: 220px;
                height: 340px;
            }

            /* --- Problem panel --- */
            .problem-panel {
                background: #fff;
                border-radius: 20px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
                padding: 30px;
                text-align: center;
                flex: 1;
                min-width: 280px;
                max-width: 400px;
            }

            .score {
                font-size: 1.1rem;
                color: #888;
                margin-bottom: 10px;
            }

            .problem {
                font-size: 3rem;
                font-weight: 700;
                margin: 20px 0;
                color: #2a7de1;
            }

            .choices {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
                margin-bottom: 16px;
            }

            .choice-btn {
                font-family: "Fredoka", sans-serif;
                font-size: 2rem;
                font-weight: 600;
                background: #b0d4f1;
                color: #1a5276;
                border: 3px solid transparent;
                border-radius: 16px;
                padding: 14px 0;
                cursor: pointer;
                transition:
                    background 0.15s,
                    transform 0.1s,
                    border-color 0.15s;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
            }
            .choice-btn:hover {
                background: #89c4e8;
            }
            .choice-btn:active {
                transform: scale(0.95);
            }
            .choice-btn.correct-flash {
                background: #43b883;
                color: #fff;
                border-color: #2e8c63;
            }
            .choice-btn.wrong-flash {
                background: #e74c3c;
                color: #fff;
                border-color: #c0392b;
            }

            .feedback {
                font-size: 1.3rem;
                min-height: 1.6em;
                margin-top: 6px;
                font-weight: 600;
            }
            .feedback.correct {
                color: #43b883;
            }
            .feedback.wrong {
                color: #e74c3c;
            }

            .complete-msg {
                font-size: 1.4rem;
                color: #f39c12;
                font-weight: 700;
                margin-top: 12px;
            }

            /* --- Confetti --- */
            .confetti-piece {
                position: fixed;
                top: -20px;
                width: 10px;
                height: 14px;
                border-radius: 2px;
                opacity: 1;
                pointer-events: none;
                z-index: 9999;
            }

            @keyframes confetti-fall {
                0% {
                    transform: translateY(0) rotate(0deg);
                    opacity: 1;
                }
                100% {
                    transform: translateY(110vh) rotate(720deg);
                    opacity: 0;
                }
            }

            @media (max-width: 540px) {
                h1 {
                    font-size: 1.8rem;
                }
                .problem {
                    font-size: 2.4rem;
                }
                .robot-container {
                    width: 160px;
                    height: 250px;
                }
                svg.robot {
                    width: 160px;
                    height: 250px;
                }
                .problem-panel {
                    padding: 20px;
                }
                .choice-btn {
                    font-size: 1.6rem;
                    padding: 12px 0;
                }
            }
        </style>
    </head>
    <body>
        <h1>Robot Math</h1>

        <div class="game-area">
            <!-- Robot SVG -->
            <div class="robot-container">
                <svg class="robot" viewBox="0 0 220 340">
                    <!-- 1. Antenna -->
                    <g class="robot-part" data-part="1">
                        <line
                            x1="110"
                            y1="18"
                            x2="110"
                            y2="50"
                            stroke="#f39c12"
                            stroke-width="5"
                            stroke-linecap="round"
                        />
                        <circle cx="110" cy="12" r="8" fill="#e74c3c" />
                    </g>
                    <!-- 2. Head -->
                    <g class="robot-part" data-part="2">
                        <rect
                            x="60"
                            y="50"
                            width="100"
                            height="75"
                            rx="18"
                            fill="#a8d8ea"
                        />
                        <rect
                            x="60"
                            y="50"
                            width="100"
                            height="75"
                            rx="18"
                            fill="none"
                            stroke="#5ba4cf"
                            stroke-width="3"
                        />
                    </g>
                    <!-- 3. Left eye -->
                    <g class="robot-part" data-part="3">
                        <circle cx="88" cy="82" r="12" fill="#fff" />
                        <circle cx="90" cy="83" r="5" fill="#333" />
                    </g>
                    <!-- 4. Right eye -->
                    <g class="robot-part" data-part="4">
                        <circle cx="132" cy="82" r="12" fill="#fff" />
                        <circle cx="134" cy="83" r="5" fill="#333" />
                    </g>
                    <!-- 5. Mouth -->
                    <g class="robot-part" data-part="5">
                        <rect
                            x="90"
                            y="102"
                            width="40"
                            height="8"
                            rx="4"
                            fill="#5ba4cf"
                        />
                    </g>
                    <!-- 6. Body -->
                    <g class="robot-part" data-part="6">
                        <rect
                            x="50"
                            y="135"
                            width="120"
                            height="110"
                            rx="16"
                            fill="#ffd166"
                        />
                        <rect
                            x="50"
                            y="135"
                            width="120"
                            height="110"
                            rx="16"
                            fill="none"
                            stroke="#e6a800"
                            stroke-width="3"
                        />
                        <circle cx="110" cy="190" r="14" fill="#e74c3c" />
                    </g>
                    <!-- 7. Left arm -->
                    <g class="robot-part" data-part="7">
                        <rect
                            x="10"
                            y="145"
                            width="34"
                            height="80"
                            rx="12"
                            fill="#a8d8ea"
                            stroke="#5ba4cf"
                            stroke-width="3"
                        />
                    </g>
                    <!-- 8. Right arm -->
                    <g class="robot-part" data-part="8">
                        <rect
                            x="176"
                            y="145"
                            width="34"
                            height="80"
                            rx="12"
                            fill="#a8d8ea"
                            stroke="#5ba4cf"
                            stroke-width="3"
                        />
                    </g>
                    <!-- 9. Left leg -->
                    <g class="robot-part" data-part="9">
                        <rect
                            x="65"
                            y="252"
                            width="32"
                            height="70"
                            rx="12"
                            fill="#a8d8ea"
                            stroke="#5ba4cf"
                            stroke-width="3"
                        />
                    </g>
                    <!-- 10. Right leg -->
                    <g class="robot-part" data-part="10">
                        <rect
                            x="123"
                            y="252"
                            width="32"
                            height="70"
                            rx="12"
                            fill="#a8d8ea"
                            stroke="#5ba4cf"
                            stroke-width="3"
                        />
                    </g>
                </svg>
            </div>

            <!-- Problem panel -->
            <div class="problem-panel">
                <div class="score">
                    Parts added: <span id="score">0</span> / 10
                </div>
                <div class="problem" id="problem"></div>
                <div class="choices" id="choices">
                    <button class="choice-btn"></button>
                    <button class="choice-btn"></button>
                    <button class="choice-btn"></button>
                    <button class="choice-btn"></button>
                </div>
                <div class="feedback" id="feedback"></div>
                <div class="complete-msg" id="complete"></div>
            </div>
        </div>

        <script>
            (function () {
                const problemEl = document.getElementById("problem");
                const feedbackEl = document.getElementById("feedback");
                const scoreEl = document.getElementById("score");
                const completeEl = document.getElementById("complete");
                const parts = document.querySelectorAll(".robot-part");
                const choiceBtns = document.querySelectorAll(".choice-btn");

                let correctCount = 0;
                let currentAnswer = 0;
                let locked = false; // prevent clicks during feedback delay
                let celebrationDone = false;

                /* --- Sound via Web Audio API (no external files) --- */
                function playFanfare() {
                    try {
                        const ctx = new (
                            window.AudioContext || window.webkitAudioContext
                        )();
                        const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
                        notes.forEach(function (freq, i) {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = "triangle";
                            osc.frequency.value = freq;
                            gain.gain.setValueAtTime(
                                0.3,
                                ctx.currentTime + i * 0.18,
                            );
                            gain.gain.exponentialRampToValueAtTime(
                                0.001,
                                ctx.currentTime + i * 0.18 + 0.6,
                            );
                            osc.connect(gain);
                            gain.connect(ctx.destination);
                            osc.start(ctx.currentTime + i * 0.18);
                            osc.stop(ctx.currentTime + i * 0.18 + 0.6);
                        });
                    } catch (_) {
                        /* silent fallback */
                    }
                }

                /* --- Confetti --- */
                function launchConfetti() {
                    var colors = [
                        "#e74c3c",
                        "#f39c12",
                        "#2ecc71",
                        "#3498db",
                        "#9b59b6",
                        "#1abc9c",
                        "#e67e22",
                        "#e84393",
                    ];
                    for (var i = 0; i < 120; i++) {
                        var el = document.createElement("div");
                        el.className = "confetti-piece";
                        el.style.left = Math.random() * 100 + "vw";
                        el.style.background =
                            colors[Math.floor(Math.random() * colors.length)];
                        el.style.width = 6 + Math.random() * 8 + "px";
                        el.style.height = 10 + Math.random() * 10 + "px";
                        el.style.borderRadius =
                            Math.random() > 0.5 ? "50%" : "2px";
                        var duration = 2 + Math.random() * 2;
                        el.style.animation =
                            "confetti-fall " +
                            duration +
                            "s ease-out " +
                            Math.random() * 0.8 +
                            "s forwards";
                        document.body.appendChild(el);
                        (function (elem, dur) {
                            setTimeout(
                                function () {
                                    elem.remove();
                                },
                                (dur + 1) * 1000,
                            );
                        })(el, duration + 0.8);
                    }
                }

                /* --- Generate wrong answers that are plausible --- */
                function generateChoices(answer) {
                    var choices = new Set();
                    choices.add(answer);
                    while (choices.size < 4) {
                        // offset by -3..+3 but not 0, and keep >= 0
                        var offset = Math.floor(Math.random() * 6) - 3;
                        if (offset === 0) offset = Math.random() < 0.5 ? -1 : 1;
                        var wrong = answer + offset;
                        if (wrong < 0) wrong = answer + Math.abs(offset);
                        choices.add(wrong);
                    }
                    // shuffle
                    var arr = Array.from(choices);
                    for (var i = arr.length - 1; i > 0; i--) {
                        var j = Math.floor(Math.random() * (i + 1));
                        var t = arr[i];
                        arr[i] = arr[j];
                        arr[j] = t;
                    }
                    return arr;
                }

                function newProblem() {
                    feedbackEl.textContent = "";
                    feedbackEl.className = "feedback";

                    var isAdd = Math.random() < 0.5;
                    var a, b;
                    if (isAdd) {
                        a = Math.floor(Math.random() * 10);
                        b = Math.floor(Math.random() * 10);
                        currentAnswer = a + b;
                        problemEl.textContent = a + " + " + b + " = ?";
                    } else {
                        a = Math.floor(Math.random() * 10);
                        b = Math.floor(Math.random() * (a + 1));
                        currentAnswer = a - b;
                        problemEl.textContent = a + " \u2212 " + b + " = ?";
                    }

                    var choices = generateChoices(currentAnswer);
                    choiceBtns.forEach(function (btn, i) {
                        btn.textContent = choices[i];
                        btn.className = "choice-btn";
                        btn.disabled = false;
                    });
                    locked = false;
                }

                function revealPart(index) {
                    if (index < parts.length) {
                        parts[index].classList.add("visible");
                    }
                }

                function handleChoice(btn) {
                    if (locked) return;
                    var value = parseInt(btn.textContent, 10);

                    if (value === currentAnswer) {
                        locked = true;
                        btn.classList.add("correct-flash");
                        feedbackEl.textContent = "Correct!";
                        feedbackEl.className = "feedback correct";
                        correctCount++;
                        scoreEl.textContent = correctCount;
                        revealPart(correctCount - 1);

                        if (correctCount === 10 && !celebrationDone) {
                            celebrationDone = true;
                            completeEl.textContent =
                                "The robot is complete! Keep going for more practice!";
                            playFanfare();
                            launchConfetti();
                        }

                        setTimeout(function () {
                            newProblem();
                        }, 600);
                    } else {
                        btn.classList.add("wrong-flash");
                        btn.disabled = true;
                        feedbackEl.textContent = "Try again! You can do it!";
                        feedbackEl.className = "feedback wrong";
                    }
                }

                choiceBtns.forEach(function (btn) {
                    btn.addEventListener("click", function () {
                        handleChoice(btn);
                    });
                });

                newProblem();
            })();
        </script>
    </body>
</html>
